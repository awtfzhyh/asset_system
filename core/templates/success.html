<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Submitted - CoE Asset</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Inter', sans-serif; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .success-card { 
            background: #ffffff; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); 
            border-top: 8px solid #198754; 
            padding: 50px; 
            max-width: 500px;
            text-align: center;
        }
        .success-icon {
            font-size: 60px;
            color: #198754;
            margin-bottom: 20px;
        }
        h2 { 
            font-weight: 700; 
            color: #212529; 
            margin-bottom: 15px; 
        }
        .message { 
            color: #6c757d; 
            font-size: 1.05rem; 
            margin-bottom: 30px; 
        }
        .btn-primary { 
            padding: 12px 25px; 
            font-weight: 600; 
            border-radius: 8px; 
            background-color: #0d6efd; 
        }
        .btn-outline-secondary { 
            padding: 12px 25px; 
            font-weight: 600; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="success-card">
        <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-check2-circle" viewBox="0 0 16 16">
                <path d="M2.5 8a5.5 5.5 0 0 1 8.25-4.764.5.5 0 0 0 .5-.866A6.5 6.5 0 1 0 14.5 8a.5.5 0 0 0-1 0 5.5 5.5 0 1 1-11 0z"/>
                <path d="M15.354 3.354a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0l7-7z"/>
            </svg>
        </div>
        
        <h2>Success!</h2>
        <p class="message">
            Your request has been recorded and sent to the CoE Admin for review. 
            You will receive an update once it has been processed.
        </p>

        <div class="d-grid gap-2">
            <a href="{% url 'manage_assets' %}" class="btn btn-primary">Back to Dashboard</a>
            
            <a href="{% url 'borrow_asset' asset_id=1 %}" class="btn btn-outline-secondary">Submit Another Request</a>
        </div>

        <p class="text-muted mt-4" style="font-size: 0.85rem;">
            Questions? Contact <a href="mailto:coe@sdec.com.my" class="text-decoration-none">coe@sdec.com.my</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
